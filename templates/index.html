<!DOCTYPE html>
<html>
<head>
    <title>Khan Sir Hospital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        
        <h2 class="text-center mb-4">Khan Sir Hospital</h2>

        <form action="/book" method="post">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Age</label>
                <input type="number" name="age" class="form-control" placeholder="Enter age" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Gender</label><br>
                <input type="radio" name="gender" value="Male" required> Male
                <input type="radio" name="gender" value="Female"> Female
                <input type="radio" name="gender" value="Other"> Other
            </div>

            <div class="mb-3">
                <label class="form-label">Contact Number</label>
                <input type="text" name="contactnumber" class="form-control" placeholder="Enter 10-digit number" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control" placeholder="Enter address" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Problem</label>
                <input type="text" name="problem" class="form-control" placeholder="Describe problem" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Book Appointment</button>

        </form>

        <div class="text-center mt-3">
            <a href="/admin">Go to Admin Panel</a>
        </div>

    </div>
</div>

</body>
</html>
