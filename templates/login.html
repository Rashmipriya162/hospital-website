<!DOCTYPE html>
<html>
<head>

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Admin Login
        </h2>

        <form method="post">

            <div class="mb-3">

                <label>Username</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>


            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>


            <button type="submit"
                    class="btn btn-dark w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>
</html>
