<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Khan Sir Hospital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <!-- Hospital Heading -->

            <h1 class="text-center text-primary mb-3">
                Khan Sir Hospital
            </h1>

            <h4 class="text-center mb-4">
                Online Appointment Booking System
            </h4>


            <!-- QR CODE SECTION -->

            <div class="text-center mb-4">

                <img src="{{ url_for('static', filename='qr.png') }}"
                     alt="QR Code"
                     width="220"
                     class="img-fluid rounded shadow">

                <p class="mt-3 text-success fw-bold">
                    Scan QR Code to Open Appointment Page
                </p>

            </div>


            <!-- APPOINTMENT FORM -->

            <form action="/book" method="POST">

                <!-- Name -->

                <div class="mb-3">

                    <label class="form-label">
                        Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter your name"
                           required>

                </div>


                <!-- Age -->

                <div class="mb-3">

                    <label class="form-label">
                        Age
                    </label>

                    <input type="number"
                           name="age"
                           class="form-control"
                           placeholder="Enter your age"
                           required>

                </div>


                <!-- Gender -->

                <div class="mb-3">

                    <label class="form-label d-block">
                        Gender
                    </label>

                    <input type="radio"
                           name="gender"
                           value="Male"
                           required> Male

                    &nbsp;&nbsp;

                    <input type="radio"
                           name="gender"
                           value="Female"> Female

                    &nbsp;&nbsp;

                    <input type="radio"
                           name="gender"
                           value="Other"> Other

                </div>


                <!-- Contact Number -->

                <div class="mb-3">

                    <label class="form-label">
                        Contact Number
                    </label>

                    <input type="text"
                           name="contactnumber"
                           class="form-control"
                           placeholder="Enter 10-digit number"
                           required>

                </div>


                <!-- Address -->

                <div class="mb-3">

                    <label class="form-label">
                        Address
                    </label>

                    <textarea name="address"
                              class="form-control"
                              rows="3"
                              placeholder="Enter your address"
                              required></textarea>

                </div>


                <!-- Problem -->

                <div class="mb-3">

                    <label class="form-label">
                        Problem
                    </label>

                    <textarea name="problem"
                              class="form-control"
                              rows="3"
                              placeholder="Describe your problem"
                              required></textarea>

                </div>


                <!-- Submit Button -->

                <button type="submit"
                        class="btn btn-primary w-100">

                    Book Appointment

                </button>

            </form>

        </div>

    </div>

</body>

</html>
